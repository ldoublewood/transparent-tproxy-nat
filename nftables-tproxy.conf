#!/usr/sbin/nft -f
# =============================================================================
# nftables NAT 透明网关 + TPROXY  完整配置
# =============================================================================
# 拓扑:
#   手机(192.168.2.64) → WiFi AP → wlo1(192.168.2.200) 本机 enx00e04c6515ff(192.168.1.217) → ISP(192.168.1.1) → 互联网
#                         (LAN)      ↑ 双网卡网关              ↑ (WAN)
#
#   wlo1             = LAN口 — 客户端通过 WiFi AP 接入，TPROXY 在此截获 TCP/UDP
#   enx00e04c6515ff  = WAN口 — 通互联网，MASQUERADE 在此做源地址伪装
#
#   - LAN 内客户端将默认网关设为本机 wlo1 IP (192.168.2.200)
#   - 本机自己的默认网关指向 ISP 路由器 (192.168.1.1)
#
# 部署: /etc/nftables.conf   Ubuntu 22.04 | nftables ≥ 1.0.2
#
#        ┌──────────────────────────────────────────────────┐
#        │  ⚠ 先执行策略路由（必须，只在 nftables 生效前） │
#        │    bash setup-tproxy-route.sh                    │
#        └──────────────────────────────────────────────────┘
# =============================================================================

flush ruleset

# =============================================================================
# 用户变量 — 务必按实际环境修改
# =============================================================================
define LAN_IFACE     = wlo1               # LAN口网卡 (客户端接入侧)
define WAN_IFACE     = enx00e04c6515ff    # WAN口网卡 (互联网出口)
define LAN_SUBNET    = 192.168.2.0/24     # LAN子网
define TPROXY_PORT   = 17893              # TPROXY 监听端口
define TPROXY_MARK   = 1                  # 防火墙标记 (与策略路由 fwmark 一致)

# =============================================================================
# table inet nat_gateway
# 一张表承载全部功能: TPROXY 截获 + 过滤 + NAT 伪装
# =============================================================================
table inet nat_gateway {

    # -----------------------------------------------------------------
    # 1. TPROXY 截获链 (mangle 优先级，比路由决策更早)
    # -----------------------------------------------------------------
    chain tproxy_prerouting {
        type filter hook prerouting priority mangle; policy accept;

        # (a) 排除本机回环
        iif "lo" accept

        # (b) 只处理 LAN 网卡入站流量
        iif != $LAN_IFACE accept

        # (c) 排除发往局域网内部的流量 (不代理内网通信)
        ip daddr $LAN_SUBNET accept

        # (d) 排除广播/多播
        ip daddr 224.0.0.0/4 accept

        # (e) 排除发往本机自身的流量 (SSH / 管理流量不走代理)
        #     tproxy 需要本机 IP，可用 fib 或显式列出
        #     此处用 fib daddr type local 排除所有本机地址
        fib daddr type local accept

        # ==========================================================
        # TPROXY 核心规则
        #   将 TCP 流量重定向到本地代理端口，保留原始目标地址
        #   标记 fwmark 供策略路由将包投递到本地 lo
        # ==========================================================

        # TCP → TPROXY
        ip protocol tcp \
            tproxy ip to :$TPROXY_PORT \
            meta mark set $TPROXY_MARK \
            accept

        # UDP → TPROXY (DNS 解析必经之路)
        ip protocol udp \
            tproxy ip to :$TPROXY_PORT \
            meta mark set $TPROXY_MARK \
            accept

        # 未匹配的流量继续走正常路由/转发流程
    }

    # -----------------------------------------------------------------
    # 2. input 链 — 控制发往本机自身的流量
    # -----------------------------------------------------------------
    chain input {
        type filter hook input priority filter; policy drop;

        # 回环全部放行
        iif "lo" accept

        # 已建立/关联的连接放行
        ct state established,related accept

        # 允许 LAN 内客户端 SSH 到本机
        iif $LAN_IFACE ip saddr $LAN_SUBNET tcp dport 22 accept

        # 允许 LAN 内 ping 本机
        iif $LAN_IFACE ip saddr $LAN_SUBNET ip protocol icmp accept

        # 允许 DHCP 客户端续约 (如果本机是 DHCP 获取 IP)
        iif $LAN_IFACE udp dport 68 accept

        # 放行 TPROXY 标记的包 — TPROXY 截获后经策略路由投递到本地，必经过 INPUT 链
        meta mark $TPROXY_MARK accept comment "TPROXY local delivery"

        # 其余入站一律记录后丢弃
        log prefix "nft-input-drop: " flags all counter drop
    }

    # -----------------------------------------------------------------
    # 3. forward 链 — 控制穿过本机的流量 (LAN ↔ 互联网)
    # -----------------------------------------------------------------
    chain forward {
        type filter hook forward priority filter; policy drop;

        # 已建立/关联的连接放行 (返回流量)
        ct state established,related accept

        # 从 LAN 发往互联网的转发流量 (TPROXY 截获 TCP/UDP,此处放行 ICMP等)
        iif $LAN_IFACE oif $WAN_IFACE ip saddr $LAN_SUBNET accept

        # TPROXY 回复包: 代理发出的欺骗包 (src 为外部地址) 需要到达 LAN 客户端
        # 这些包从本地 lo 接口生成，出 wlo1，需穿过 forward 链
        iif "lo" oif $LAN_IFACE accept

        log prefix "nft-fwd-drop: " flags all counter drop
    }

    # -----------------------------------------------------------------
    # 4. output 链 — 控制本机自身发出的流量
    # -----------------------------------------------------------------
    chain output {
        type filter hook output priority filter; policy accept;

        # 默认允许本机所有出站
        # 如果需要对特定目标做限制，在此添加规则
    }

    # -----------------------------------------------------------------
    # 5. postrouting 链 — NAT 伪装 (MASQUERADE)
    # -----------------------------------------------------------------
    #  只有被"转发"的包会到达这里。
    #  TPROXY 截获的 TCP 包已在 prerouting 被 accept → 本地投递,不会到这里。
    #  代理程序主动发出的出站连接走 output,也不到这里。
    #  所以这里主要伪装: UDP DNS / ICMP 等未被 TPROXY 处理的转发流量。
    # -----------------------------------------------------------------
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;

        # 在 WAN 口做 SNAT: LAN 客户端源地址 → 本机WAN口地址
        # ISP路由器(192.168.1.1) 不认识 192.168.2.x，必须伪装成 192.168.1.217
        oif $WAN_IFACE ip saddr $LAN_SUBNET masquerade
    }
}

# =============================================================================
# 完整数据流示意 (TCP — 走 TPROXY)
# =============================================================================
#
#  手机(192.168.2.64)
#   │  TCP SYN → 1.2.3.4:443  (gw=192.168.2.200)
#   ▼
#  ┌─wlo1(192.168.2.200)────────────────────────┐
#  │ [prerouting mangle]                         │
#  │   iif=wlo1 ✓  daddr∉LAN ✓  fib local ✗     │
#  │   → tproxy ip to :17893, mark=1, accept     │
#  │                                             │
#  │ [策略路由: fwmark 1 → table 100 → lo]        │
#  │ [INPUT: meta mark 1 → accept]               │
#  │                                             │
#  │ [代理 ipt2socks :17893]                      │
#  │   → SO_ORIGINAL_DST → 1.2.3.4:443          │
#  │   → SOCKS5 出站 → enx00e04c6515ff → 互联网   │
#  └─────────────────────────────────────────────┘
#   欺骗回复: lo → forward(lo→wlo1) → 手机
#
# =============================================================================
# 完整数据流示意 (ICMP — 非 TPROXY 转发)
# =============================================================================
#
#  手机(192.168.2.64)
#   │  ICMP → 8.8.8.8  (gw=192.168.2.200)
#   ▼
#  ┌─wlo1────────────────────────────────────────┐
#  │ [prerouting mangle] 无 TPROXY 匹配 → 继续    │
#  │ [路由决策] 目标非本地                        │
#  │ [forward] iif wlo1 → oif enx00e04c6515ff ✓  │
#  │ [postrouting] MASQUERADE src→192.168.1.217  │
#  └─────────────────────────────────────────────┘
#        → enx00e04c6515ff → ISP(192.168.1.1) → 8.8.8.8
#   返回: conntrack 反向 MASQUERADE → forward → wlo1 → 手机
# =============================================================================

# =============================================================================
# 部署步骤
# =============================================================================
# 1. 配置并执行策略路由:
#    bash setup-tproxy-route.sh
#
# 2. 加载 nftables 规则:
#    nft -f /etc/nftables.conf
#
# 3. 开机自启:
#    cp nftables-tproxy.conf /etc/nftables.conf
#    systemctl enable --now nftables
#    cp tproxy-route.service /etc/systemd/system/
#    systemctl enable --now tproxy-route
#
# 4. 代理程序 (以 Xray 为例) inbound 必须启用 tproxy:
#    {
#        "port": 17893,
#        "protocol": "dokodemo-door",
#        "settings": { "network": "tcp,udp", "followRedirect": true },
#        "streamSettings": { "sockopt": { "tproxy": "tproxy" } }
#    }
#
# 5. LAN 客户端配置:
#    将默认网关设为本机 IP (如 192.168.1.50)
#    curl -v http://httpbin.org/ip   # 验证
# =============================================================================
